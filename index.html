<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Standard favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co/4wMBpYGV/favicon-16x16-png.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://i.ibb.co/mCvLR3Gf/favicon-32x32-png.png">
  <link rel="icon" type="image/png" sizes="48x48" href="https://i.ibb.co/yn3MdVWq/favicon-48x48-png.png">

  <!-- Apple Touch Icon (iOS) -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/1t1hWwgj/apple-touch-icon-png.png">

  <!-- Android Chrome -->
  <link rel="icon" type="image/png" sizes="192x192" href="https://i.ibb.co/HDTtrVts/android-chrome-192x192-png.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://i.ibb.co/j9ZC1Bf4/android-chrome-512x512-png.png">

  <!-- Standaard fallback -->
  <link rel="shortcut icon" href="https://i.ibb.co/mCvLR3Gf/favicon-32x32-png.png">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="var(--accent)"/>
          <path d="M12 14h16M12 20h10M12 26h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="login-title">Notities</h1>
      <p class="login-sub">Jouw gedachten, geordend.</p>
      <button id="google-login-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Inloggen met Google
      </button>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="screen hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="10" fill="var(--accent)"/>
            <path d="M12 14h16M12 20h10M12 26h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span>Notities</span>
        </div>
        <button id="new-note-btn" class="icon-btn" title="Nieuwe notitie">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Zoeken…" />
      </div>

      <div id="notes-list" class="notes-list"></div>

      <div class="sidebar-footer">
        <div class="user-info">
          <img id="user-avatar" src="" alt="" />
          <span id="user-name"></span>
        </div>
        <div class="footer-actions">
          <button id="theme-toggle" class="icon-btn" title="Thema wisselen">
            <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button id="logout-btn" class="icon-btn" title="Uitloggen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- MOBILE SIDEBAR TOGGLE -->
    <button id="sidebar-toggle" class="sidebar-toggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- EDITOR AREA -->
    <main id="editor-area">
      <div id="empty-state" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 40 40" fill="none" opacity="0.3">
          <rect width="40" height="40" rx="10" fill="var(--accent)"/>
          <path d="M12 14h16M12 20h10M12 26h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <p>Selecteer een notitie of maak een nieuwe aan</p>
      </div>

      <div id="editor-container" class="hidden">
        <div class="editor-topbar">
          <input type="text" id="note-title" placeholder="Titel…" class="note-title-input" />
          <div class="editor-topbar-actions">
            <span id="save-status" class="save-status"></span>
            <button id="delete-note-btn" class="icon-btn danger" title="Notitie verwijderen">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar" id="toolbar">
          <div class="toolbar-group">
            <button data-command="bold" title="Vet (Ctrl+B)"><b>B</b></button>
            <button data-command="italic" title="Cursief (Ctrl+I)"><i>I</i></button>
            <button data-command="strikeThrough" title="Doorstrepen">
              <s>S</s>
            </button>
            <button data-command="underline" title="Onderstrepen"><u>U</u></button>
          </div>
          <div class="toolbar-sep"></div>
          <div class="toolbar-group">
            <button data-command="formatBlock" data-value="h1" title="Titel">H1</button>
            <button data-command="formatBlock" data-value="h2" title="Subtitel">H2</button>
            <button data-command="formatBlock" data-value="h3" title="Kop">H3</button>
            <button data-command="formatBlock" data-value="p" title="Paragraaf">P</button>
          </div>
          <div class="toolbar-sep"></div>
          <div class="toolbar-group">
            <button data-command="insertUnorderedList" title="Opsomming">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
            </button>
            <button data-command="insertOrderedList" title="Genummerde lijst">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4" stroke-linecap="round"/><path d="M4 10h2" /><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" /></svg>
            </button>
            <button id="checklist-btn" title="Checklist">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            </button>
          </div>
          <div class="toolbar-sep"></div>
          <div class="toolbar-group">
            <button id="highlight-btn" title="Markering" style="background:none">
              <span style="background:#fde68a;padding:1px 5px;border-radius:3px;font-size:12px;font-weight:600">M</span>
            </button>
            <button data-command="formatBlock" data-value="blockquote" title="Citaat">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 2v6c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 2v6c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
            </button>
            <button id="code-block-btn" title="Code block">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </button>
            <button id="table-btn" title="Tabel invoegen">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            </button>
          </div>
        </div>

        <div
          id="editor"
          class="editor"
          contenteditable="true"
          spellcheck="true"
        ></div>
      </div>
    </main>
  </div>

  <!-- TABLE MODAL -->
  <div id="table-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Tabel invoegen</h3>
      <div class="modal-field">
        <label>Rijen</label>
        <input type="number" id="table-rows" value="3" min="1" max="20" />
      </div>
      <div class="modal-field">
        <label>Kolommen</label>
        <input type="number" id="table-cols" value="3" min="1" max="10" />
      </div>
      <div class="modal-actions">
        <button id="table-cancel" class="btn-secondary">Annuleren</button>
        <button id="table-insert" class="btn-primary">Invoegen</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
